apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: sms-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: sms-platform
    spec:
      # Until we run Postgres + Jaeger inside kind (Phase 2), pods reach
      # the host's compose stack via these /etc/hosts entries. The IPs come
      # from `docker inspect sms-postgres / sms-jaeger`. If you tear down
      # and re-up the compose stack, IPs may change — re-apply this file.
      hostAliases:
        - ip: "172.17.6.3"
          hostnames:
            - "postgres"
        - ip: "172.17.6.2"
          hostnames:
            - "jaeger"
      containers:
        - name: gateway
          image: sms-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secret
          # Probes: initialDelaySeconds chosen against an actual measured
          # cold-start of ~3-5s. Liveness gives more grace than readiness
          # because a flap shouldn't restart the pod — that's readyz's job.
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
