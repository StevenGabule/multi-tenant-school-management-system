global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sms-local

scrape_configs:
  # Scrape the collector's Prometheus exporter (metrics from services).
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          source: collector

  # Self-scrape — useful for confirming Prometheus is healthy.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
