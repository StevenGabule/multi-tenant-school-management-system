# Local development stack for the multi-tenant SMS.
# Run from repo root:  docker compose -f infra/docker-compose.yml up -d
#
# Variables come from ../.env.local (gitignored). See .env.example for the schema.

name: sms

services:
  postgres:
    image: postgres:16-alpine
    container_name: sms-postgres
    restart: unless-stopped
    env_file:
      - ../.env.local
    ports:
      # Host 5433 -> container 5432 to avoid colliding with any native
      # Postgres on the host. Update DATABASE_URL accordingly.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run once on first init (empty data dir). For existing
      # postgres_data volumes, sms_control must be created by hand:
      #   docker exec sms-postgres psql -U sms_app -c 'CREATE DATABASE sms_control;'
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      # Host 6380 -> container 6379, same reason as postgres on 5433
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # =============================================================================
  # Observability stack (milestone 1.8) — replaces the milestone 1.0 Jaeger
  # all-in-one with the full {Collector → Tempo + Prometheus + Loki +
  # Grafana} pipeline.
  #
  # Services emit OTLP to the collector (4317/4318); the collector fans out:
  #   traces  → Tempo
  #   metrics → Prometheus (via /metrics scrape on port 8889)
  #   logs    → Loki (OTLP /otlp/v1/logs)
  # =============================================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: sms-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC receiver — services point here
      - "4318:4318"     # OTLP HTTP receiver
      - "8889:8889"     # Prometheus metrics endpoint (scrape target)
    depends_on:
      - tempo
      - prometheus
      - loki

  tempo:
    image: grafana/tempo:2.6.0
    container_name: sms-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    user: root
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"     # Tempo HTTP API (Grafana queries here)

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: sms-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.2.0
    container_name: sms-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    user: root
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: sms-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"     # 3030 host -> 3000 container (3000 is gateway)
    depends_on:
      - prometheus
      - tempo
      - loki

  # Keycloak — IAM backbone for milestone 1.6 onward. OIDC provider that
  # issues access + refresh tokens, manages realm roles/groups, and
  # exposes JWKS at /realms/<realm>/protocol/openid-connect/certs.
  #
  # `start-dev` is the dev profile — HTTP listener (no TLS), no clustering,
  # H2-by-default unless KC_DB is set. We point KC_DB at our shared
  # Postgres for parity with how it'll run in staging/prod (where
  # Keycloak's persistent state — realms, clients, users — must outlive
  # container restarts).
  #
  # Bootstrap admin user (KEYCLOAK_ADMIN/KEYCLOAK_ADMIN_PASSWORD) is the
  # ONLY way to get the first kcadm.sh login. Production uses an external
  # IdP federation or rotates this immediately.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sms-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_local_dev_pwd
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: sms_app
      KC_DB_PASSWORD: local_dev_only_change_me_when_you_can
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # JVM flags — Keycloak's default heap is fine for dev; the cap
      # keeps it from squeezing WSL2 memory.
      JAVA_OPTS_APPEND: "-Xms512m -Xmx1024m"
    ports:
      - "8080:8080"
    healthcheck:
      # /health/ready reports 200 when realm import is complete + DB
      # connection pool is warm. ~25-40s on a typical machine.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  adminer:
    image: adminer:4
    container_name: sms-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"

  # Transaction-mode connection pooler in front of Postgres. Runtime app
  # connects to pgbouncer:6432 (with ?pgbouncer=true to disable Prisma's
  # prepared-statement cache). Migrations bypass — they need direct
  # session/DDL semantics that transaction-mode pooling breaks.
  #
  # AUTH_TYPE=md5 keeps the userlist readable and lets the entrypoint
  # auto-generate it from DB_USER/DB_PASSWORD (vs scram-sha-256 which
  # would need pre-hashed entries). This is local-dev only; production
  # injects pre-computed hashes via secrets.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: sms-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LISTEN_PORT: "6432"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sms_dev
      DB_USER: app_user
      DB_PASSWORD: app_user_local_dev_pwd
      POOL_MODE: transaction
      # SCRAM-SHA-256 matches Postgres 16's default password storage.
      # PgBouncer 1.25 supports it bidirectionally — clients send SCRAM,
      # PgBouncer authenticates to Postgres with SCRAM too.
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: app_user
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      # Prisma sends extra_float_digits + application_name on connect.
      # PgBouncer rejects unknown startup params unless we list them here.
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path,application_name
    ports:
      - "6432:6432"

volumes:
  postgres_data:
    name: sms_postgres_data
  redis_data:
    name: sms_redis_data
  tempo_data:
    name: sms_tempo_data
  prometheus_data:
    name: sms_prometheus_data
  loki_data:
    name: sms_loki_data
  grafana_data:
    name: sms_grafana_data
