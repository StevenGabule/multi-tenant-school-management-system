name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: build, typecheck, test, dockerize
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so `nx affected` can compare base..head on PRs
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.1

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Prisma 7 validates DATABASE_URL even for codegen; placeholder is fine.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder/placeholder
        run: pnpm exec prisma generate --schema apps/gateway/prisma/schema.prisma

      - name: Derive nx base/head SHAs (PR only)
        if: github.event_name == 'pull_request'
        uses: nrwl/nx-set-shas@v4

      - name: typecheck, test, build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec nx affected -t typecheck test build \
              --parallel=3 --exclude=@org/gateway-e2e
          else
            pnpm exec nx run-many -t typecheck test build \
              --parallel=3 --exclude=@org/gateway-e2e
          fi

      - name: Build gateway docker image
        run: docker build -t sms-gateway:ci -f apps/gateway/Dockerfile .

      - name: Report image size
        run: |
          SIZE=$(docker images sms-gateway:ci --format '{{.Size}}')
          echo "::notice title=Gateway image size::$SIZE"
          docker images sms-gateway:ci
